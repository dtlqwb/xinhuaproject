server:
  port: 8080

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://mysql:3306/sales_customer_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root123}
  
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT配置
jwt:
  secret: salesCustomerSystemSecretKey2024
  expiration: 86400000  # 24小时

# 文件上传路径
file:
  upload-path: ./uploads/

# 阿里百炼AI配置
aliyun:
  bailian:
    api-key: ${ALIYUN_BAILIAN_API_KEY:sk-440c8d370a8744f08a6a0fe87fae5650}
    base-url: https://dashscope.aliyuncs.com/api/v1
    model: qwen-plus  # 使用的模型
