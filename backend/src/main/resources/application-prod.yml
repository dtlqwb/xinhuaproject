server:
  port: 8080

spring:
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/sales_customer_db?useUnicode=true&characterEncoding=utf8&useSSL=true&serverTimezone=Asia/Shanghai&useLegacyDatetimeCode=false}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT配置
jwt:
  secret: ${JWT_SECRET:salesCustomerSystemSecretKey2024Production}
  expiration: ${JWT_EXPIRATION:86400000}

# 文件上传路径
file:
  upload-path: ${FILE_UPLOAD_PATH:/data/uploads/}

# 阿里百炼AI配置
aliyun:
  bailian:
    api-key: ${ALIYUN_BAILIAN_API_KEY}
    base-url: https://dashscope.aliyuncs.com/api/v1
    model: qwen-plus

# 日志配置
logging:
  level:
    root: INFO
    com.sales.customer: DEBUG
  file:
    name: /data/logs/customer-system.log
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
