name: Deploy to Server

on:
  push:
    branches: [master]
  workflow_dispatch:  # 允许手动触发

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Setup SSH
      uses: shimataro/ssh-key-action@v2
      with:
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        known_hosts: ${{ secrets.SERVER_HOST }}
        if_key_exists: replace
    
    - name: Add server to known hosts
      run: |
        mkdir -p ~/.ssh
        ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts
    
    - name: Deploy to server
      env:
        SERVER_USER: ${{ secrets.SERVER_USER }}
        SERVER_HOST: ${{ secrets.SERVER_HOST }}
        DEPLOY_DIR: /opt/xinhuaproject
      run: |
        echo "🚀 开始部署..."
        
        # 连接到服务器并执行部署
        ssh ${SERVER_USER}@${SERVER_HOST} << 'EOF'
          set -e
          
          echo "[1/6] 进入项目目录..."
          cd ${DEPLOY_DIR}
          
          echo "[2/6] 拉取最新代码..."
          git pull origin master
          
          echo "[3/6] 检查配置文件..."
          if [ ! -f .env ]; then
            cp .env.example .env
            echo "⚠️  请手动配置.env文件"
          fi
          
          echo "[4/6] 构建Docker镜像..."
          docker compose build
          
          echo "[5/6] 重启服务..."
          docker compose down
          docker compose up -d
          
          echo "[6/6] 等待服务启动..."
          sleep 10
          
          echo ""
          echo "✅ 部署完成！"
          echo ""
          echo "服务状态："
          docker compose ps
        EOF
        
        echo ""
        echo "========================================"
        echo "  🎉 部署成功！"
        echo "========================================"
        echo ""
        echo "访问地址："
        echo "  销售端: http://${{ secrets.SERVER_HOST }}:80"
        echo "  管理端: http://${{ secrets.SERVER_HOST }}:81"
