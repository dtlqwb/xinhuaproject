name: Deploy to Server

on:
  push:
    branches: [master]
  workflow_dispatch:  # 允许手动触发

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Setup SSH
      uses: shimataro/ssh-key-action@v2
      with:
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        known_hosts: ${{ secrets.SERVER_HOST }}
        if_key_exists: replace
    
    - name: Add server to known hosts
      run: |
        mkdir -p ~/.ssh
        ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts
    
    - name: Deploy to server
      env:
        SERVER_USER: ${{ secrets.SERVER_USER }}
        SERVER_HOST: ${{ secrets.SERVER_HOST }}
        DEPLOY_DIR: /opt/xinhuaproject
      run: |
        echo "🚀 开始部署..."
        
        # 连接到服务器并执行部署
        ssh ${SERVER_USER}@${SERVER_HOST} << 'EOF'
          set -e
          
          echo "[1/7] 准备部署目录..."
          
          # 检查项目目录是否存在
          if [ -d "${DEPLOY_DIR}" ]; then
            echo "  目录已存在，进入目录..."
            cd ${DEPLOY_DIR}
            
            # 检查是否是 git 仓库
            if [ -d ".git" ]; then
              echo "  是 Git 仓库，准备更新..."
            else
              echo "  目录存在但不是 Git 仓库，备份并重新克隆..."
              cd /opt
              mv xinhuaproject xinhuaproject_backup_$(date +%Y%m%d_%H%M%S)
              git clone https://github.com/dtlqwb/xinhuaproject.git
              cd xinhuaproject
            fi
          else
            echo "  首次部署，克隆项目..."
            cd /opt
            git clone https://github.com/dtlqwb/xinhuaproject.git
            cd xinhuaproject
          fi
          
          echo "[2/7] 拉取最新代码..."
          # 强制重置本地更改，确保与远程一致
          git fetch origin master
          git reset --hard origin/master
          git clean -fd
          
          echo "[3/7] 检查配置文件..."
          if [ ! -f .env ]; then
            if [ -f .env.example ]; then
              cp .env.example .env
              echo "  ⚠️  已从 .env.example 创建 .env，请检查配置"
            else
              echo "  ⚠️  未找到 .env.example，请手动创建 .env 文件"
            fi
          fi
          
          echo "[4/7] 停止旧服务..."
          sudo docker compose down || true
          
          echo "[5/7] 构建Docker镜像..."
          sudo docker compose build --no-cache
          
          echo "[6/7] 启动服务..."
          sudo docker compose up -d
          
          echo "[7/7] 等待服务启动并检查状态..."
          sleep 15
          
          echo ""
          echo "========================================"
          echo "  ✅ 部署完成！"
          echo "========================================"
          echo ""
          echo "服务状态："
          sudo docker compose ps
          echo ""
          echo "查看日志："
          echo "  sudo docker compose logs -f backend"
        EOF
        
        echo ""
        echo "========================================"
        echo "  🎉 部署成功！"
        echo "========================================"
        echo ""
        echo "访问地址："
        echo "  销售端: http://${{ secrets.SERVER_HOST }}:80"
        echo "  管理端: http://${{ secrets.SERVER_HOST }}:81"
