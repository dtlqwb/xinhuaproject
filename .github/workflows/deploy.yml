name: Deploy to Server

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Sync code to server
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USERNAME }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        source: "*.yml,*.md,backend/**,admin-frontend/**,sales-frontend/**,.github/**"
        target: "/home/ubuntu/xinhuaproject/"
        strip_components: 0
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
      
    - name: Build backend JAR
      run: |
        cd backend
        # 完全跳过测试(包括测试编译)
        mvn clean package -Dmaven.test.skip=true
        ls -lh target/*.jar
            
    - name: Copy JAR to server
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USERNAME }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        source: "backend/target/*.jar"
        target: "/home/ubuntu/xinhuaproject/backend/target/"
        strip_components: 2
            
    - name: Build and restart on server
      uses: appleboy/ssh-action@v0.1.8
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USERNAME }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        script: |
          cd /home/ubuntu/xinhuaproject
              
          echo "========== 开始部署 =========="
          echo "当前代码版本:"
          ls -lh backend/src/main/java/com/sales/customer/controller/DailyReportController.java 2>/dev/null || echo "文件不存在"
              
          # 停止旧容器
          docker-compose stop backend admin-frontend || true
              
          # 删除旧镜像
          docker rmi xinhuaproject-backend:latest xinhuaproject-admin-frontend:latest 2>/dev/null || true
              
          # 检查scp传输的jar
          echo "检查jar文件:"
          ls -lh backend/target/*.jar 2>/dev/null || echo "未找到jar文件,需要编译"
              
          # 如果jar不存在,在服务器编译(备用方案)
          if [ ! -f backend/target/*.jar ]; then
            echo "在服务器编译后端..."
            cd backend
            mvn clean package -Dmaven.test.skip=true || {
              echo "❌ 编译失败!"
              exit 1
            }
            cd ..
          fi
              
          # 重新构建Docker镜像
          echo "正在构建Docker镜像..."
          docker-compose build --no-cache backend admin-frontend
              
          if [ $? -ne 0 ]; then
            echo "❌ Docker构建失败!"
            exit 1
          fi
              
          # 启动服务
          docker-compose up -d backend admin-frontend
              
          # 等待启动
          sleep 15
              
          # 检查服务状态
          echo "========== 服务状态 =========="
          docker ps | grep -E "backend|admin"
              
          echo "========== 后端日志 =========="
          docker logs sales-backend --tail 10 | grep "Started" || echo "⚠️ 未找到Started日志"
          
          echo "========== 前端状态 =========="
          docker logs admin-frontend --tail 5
              
          echo "========================================="
          echo "✅ 自动部署完成!"
          echo "========================================="
          
