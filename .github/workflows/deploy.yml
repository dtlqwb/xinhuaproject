name: Deploy to Server

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
      
    - name: Build backend Docker image
      run: |
        cd backend
        # 编译Java代码
        mvn clean package -DskipTests
        cd ..
        # 构建Docker镜像
        docker build -t xinhuaproject-backend:latest -f backend/Dockerfile .
        # 保存镜像为文件
        docker save xinhuaproject-backend:latest -o /tmp/backend.tar
        
    - name: Deploy to server via SSH
      uses: appleboy/ssh-action@v0.1.8
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USERNAME }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        script: |
          echo "========== 开始部署 =========="
          cd /home/ubuntu/xinhuaproject
          
          # 停止旧容器
          docker-compose stop backend || true
          
          # 删除旧镜像
          docker rmi xinhuaproject-backend:latest 2>/dev/null || true
          
          echo "✅ 旧容器已停止"
          
    - name: Copy Docker image to server
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USERNAME }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        source: "/tmp/backend.tar"
        target: "/tmp/"
        
    - name: Load image and restart service
      uses: appleboy/ssh-action@v0.1.8
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USERNAME }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        script: |
          cd /home/ubuntu/xinhuaproject
          
          echo "========== 加载Docker镜像 =========="
          # 加载Docker镜像
          docker load -i /tmp/backend.tar
          
          # 启动服务
          docker-compose up -d backend
          
          # 等待启动
          sleep 15
          
          # 检查服务状态
          echo "========== 服务状态 =========="
          docker ps | grep backend
          
          echo "========== 后端日志 =========="
          docker logs sales-backend --tail 10 | grep "Started" || echo "⚠️ 未找到Started日志"
          
          # 清理临时文件
          rm -f /tmp/backend.tar
          
          echo "========================================="
          echo "✅ 自动部署完成!"
          echo "========================================="
          
